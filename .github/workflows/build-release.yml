name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build app
        run: npm run dist:win

      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          $assets = Get-ChildItem -Path 'src-tauri/target/release/bundle/nsis/*.exe', 'src-tauri/target/release/bundle/msi/*.msi' -File
          $lines = foreach ($asset in $assets) {
            $hash = Get-FileHash -Path $asset.FullName -Algorithm SHA256
            "{0}  {1}" -f $hash.Hash.ToLowerInvariant(), $asset.Name
          }
          $lines | Out-File -FilePath SHA256SUMS.txt -Encoding utf8
      
      - name: Extract version from tag
        id: version
        run: echo "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            SHA256SUMS.txt
          body: |
            Release ${{ steps.version.outputs.tag }}
            
            **Downloads:**
            - `.exe` - NSIS Installer
            - `.msi` - MSI Installer
            - `SHA256SUMS.txt` - SHA-256 checksums for verification
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
